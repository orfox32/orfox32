name: Spotify Now Playing
on:
  schedule: # Run workflow automatically
    - cron: '* * * * *' # Runs every 5 minutes
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the Github Actions Workflow page directly

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest spotify song svg.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Python 3.9
        uses: actions/setup-python@v2
        with:
          python-version: 3.9
      - name: requirements.txt
        run: |
          pip install -r ./scripts/requirements.txt 
      - name: generate
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_SECRET_ID: ${{ secrets.SPOTIFY_SECRET_ID }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          python ./scripts/spotify_np.py
          
      - name: Set background and border colors
        run: |
          background_color="#ffffff"  # Set your background color here
          border_color="#000000"      # Set your border color here

          sed -i "s/{{ background_color }}/$background_color/g" spotify.svg
          sed -i "s/{{ border_color }}/$border_color/g" spotify.svg
          
      - name: Commit and push if changed
        run: |
          git add .
          git config --global user.email "jpcanonce30@gmail.com"
          git config --global user.name "orfox32"
          git commit -m "Updated spotify.svg" || echo "No changes to commit"
          git push origin main
